# TaskPilot — Supabase Config
# Reference: https://supabase.com/docs/guides/cli/config

[project]
id = "taskpilot"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "https://taskpilot.cc",
  "https://taskpilot.cc/auth/callback",
  "http://localhost:3000/auth/callback",
  "chrome-extension://*/popup.html"
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # Set to true in production

[auth.sms]
enable_signup = false

[auth.external.google]
enabled = false
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"

[auth.external.github]
enabled = false
client_id = "env(SUPABASE_AUTH_GITHUB_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GITHUB_SECRET)"

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[[edge_runtime.functions]]
name = "ai-proxy"
verify_jwt = false  # Custom auth in function
enabled = true

[analytics]
enabled = false
port = 54327
vector_port = 54328
backend = "postgres"
