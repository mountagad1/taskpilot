<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskPilot Sidebar</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080814;
      --bg2: #0d0d1c;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.07);
      --fg: #f0f0ff;
      --fg2: rgba(240,240,255,0.65);
      --fg3: rgba(240,240,255,0.35);
      --indigo: #6366f1;
      --indigo-light: #818cf8;
      --cyan: #22d3ee;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ─── Header ─────────────────────────────── */
    .header {
      padding: 12px 14px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .logo-mark {
      width: 24px; height: 24px; border-radius: 6px;
      background: linear-gradient(135deg, #6366f1, #22d3ee);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white;
    }
    .logo-text {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px;
    }
    .close-btn {
      width: 24px; height: 24px; border-radius: 6px;
      background: var(--surface); border: 1px solid var(--border);
      cursor: pointer; font-size: 12px; color: var(--fg3);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .close-btn:hover { background: var(--surface-hover); color: var(--fg); }

    /* ─── Quick Actions ──────────────────────── */
    .quick-actions {
      padding: 10px 12px;
      display: flex; gap: 6px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
    }
    .quick-actions::-webkit-scrollbar { display: none; }
    .qa-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--surface);
      font-family: 'Syne', sans-serif; font-weight: 600; font-size: 11px;
      color: var(--fg2); cursor: pointer; white-space: nowrap;
      transition: all 0.12s;
    }
    .qa-btn:hover { background: var(--surface-hover); border-color: rgba(99,102,241,0.3); color: var(--indigo-light); }
    .qa-btn.active { background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.4); color: var(--indigo-light); }

    /* ─── Messages ───────────────────────────── */
    .messages {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 10px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: flex; gap: 8px; max-width: 100%;
    }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 12px;
    }
    .msg.ai .msg-avatar { background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(34,211,238,0.2)); }
    .msg.user .msg-avatar { background: var(--surface-hover); }

    .msg-bubble {
      max-width: calc(100% - 40px);
      padding: 9px 12px;
      border-radius: 12px; font-size: 13px; line-height: 1.55;
    }
    .msg.ai .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--fg);
      border-top-left-radius: 4px;
    }
    .msg.user .msg-bubble {
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(34,211,238,0.1));
      border: 1px solid rgba(99,102,241,0.25);
      color: var(--fg);
      border-top-right-radius: 4px;
    }

    /* ─── Thinking ───────────────────────────── */
    .thinking {
      display: flex; align-items: center; gap: 4px;
      padding: 2px 0;
    }
    .thinking span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--indigo-light);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    /* ─── Result Actions ─────────────────────── */
    .result-actions {
      display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap;
    }
    .result-action-btn {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 5px;
      border: 1px solid var(--border); background: var(--surface);
      font-size: 10px; font-weight: 600; font-family: 'Syne', sans-serif;
      color: var(--fg3); cursor: pointer; transition: all 0.12s;
    }
    .result-action-btn:hover { border-color: rgba(99,102,241,0.3); color: var(--indigo-light); }

    /* ─── Input ──────────────────────────────── */
    .input-area {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
    }
    .input-wrapper {
      display: flex; align-items: flex-end; gap: 8px;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: border-color 0.15s;
    }
    .input-wrapper:focus-within { border-color: rgba(99,102,241,0.45); }
    .input-text {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--fg); font-family: 'Space Grotesk', sans-serif; font-size: 13px;
      resize: none; max-height: 80px; min-height: 20px;
      line-height: 1.5;
    }
    .input-text::placeholder { color: var(--fg3); }
    .send-btn {
      width: 28px; height: 28px; border-radius: 7px;
      background: linear-gradient(135deg, #6366f1, #22d3ee);
      border: none; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: white;
      transition: opacity 0.15s; margin-bottom: 1px;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ─── Footer hint ────────────────────────── */
    .input-hint {
      margin-top: 5px;
      font-size: 10px; color: var(--fg3); text-align: center;
      font-family: 'Syne', sans-serif;
    }
    kbd {
      display: inline-block;
      padding: 1px 4px; border-radius: 3px;
      border: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      color: var(--fg3);
    }

    /* ─── Empty State ────────────────────────── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; text-align: center; padding: 20px;
    }
    .empty-icon { font-size: 32px; line-height: 1; }
    .empty-title {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
      color: var(--fg);
    }
    .empty-desc { font-size: 12px; color: var(--fg3); max-width: 200px; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo-mark">✦</div>
      <span class="logo-text">TaskPilot</span>
    </div>
    <button class="close-btn" id="closeBtn" title="Close sidebar (Esc)">✕</button>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <button class="qa-btn" data-task="summarize">📄 Summarize</button>
    <button class="qa-btn" data-task="extract_data">📊 Extract</button>
    <button class="qa-btn" data-task="translate">🌐 Translate</button>
    <button class="qa-btn" data-task="generate_reply">✍️ Reply</button>
    <button class="qa-btn" data-task="rewrite">✏️ Rewrite</button>
    <button class="qa-btn" data-task="export">⬇️ Export</button>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">✦</div>
      <div class="empty-title">Ask about this page</div>
      <div class="empty-desc">Summarize, extract data, generate replies, or ask anything</div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        class="input-text"
        id="inputText"
        placeholder="Ask anything... (Shift+Enter for newline)"
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" disabled>→</button>
    </div>
    <div class="input-hint">
      <kbd>Enter</kbd> to send · <kbd>Esc</kbd> to close
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages')
    const inputEl = document.getElementById('inputText')
    const sendBtn = document.getElementById('sendBtn')
    const emptyState = document.getElementById('emptyState')

    let conversationHistory = []
    let pageContext = null

    // ─── Init: get page context ───────────────
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'PAGE_CONTEXT') {
        pageContext = e.data.context
      }
      if (e.data?.type === 'SIDEBAR_TASK') {
        handleTask(e.data.task, e.data.userInput || '')
      }
    })

    // Request page context from content script
    window.parent.postMessage({ type: 'REQUEST_PAGE_CONTEXT' }, '*')

    // ─── Quick Actions ────────────────────────
    document.querySelectorAll('.qa-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const task = btn.dataset.task
        document.querySelectorAll('.qa-btn').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        handleTask(task, '')
      })
    })

    // ─── Close ────────────────────────────────
    document.getElementById('closeBtn').addEventListener('click', () => {
      window.parent.postMessage({ type: 'CLOSE_SIDEBAR' }, '*')
    })

    // ─── Input ────────────────────────────────
    inputEl.addEventListener('input', () => {
      sendBtn.disabled = !inputEl.value.trim()
      inputEl.style.height = 'auto'
      inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + 'px'
    })

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault()
        if (inputEl.value.trim()) send()
      }
    })

    sendBtn.addEventListener('click', send)

    function send() {
      const text = inputEl.value.trim()
      if (!text) return
      inputEl.value = ''
      inputEl.style.height = 'auto'
      sendBtn.disabled = true
      handleTask('custom', text)
    }

    // ─── Handle task ──────────────────────────
    async function handleTask(task, userInput) {
      if (emptyState) emptyState.style.display = 'none'

      const displayText = userInput || taskLabel(task)
      addMessage('user', displayText)

      const thinkingId = addThinking()

      try {
        const response = await fetch('https://taskpilot.cc/api/ai/process', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            task,
            userInput,
            pageContext: {
              url: pageContext?.url || window.location.href,
              content: pageContext?.content || '',
              title: pageContext?.title || '',
            },
          }),
        })

        removeThinking(thinkingId)

        if (!response.ok) {
          const err = await response.json()
          addMessage('ai', `⚠️ ${err.error || 'Something went wrong. Please try again.'}`)
          return
        }

        const data = await response.json()
        addMessage('ai', data.result, { task, cached: data.cached, tokensUsed: data.tokensUsed })
      } catch (err) {
        removeThinking(thinkingId)
        addMessage('ai', '⚠️ Failed to connect to TaskPilot. Check your connection.')
      }
    }

    function taskLabel(task) {
      const labels = {
        summarize: 'Summarize this page',
        extract_data: 'Extract all data from this page',
        translate: 'Translate this page',
        generate_reply: 'Generate a reply',
        rewrite: 'Rewrite selected text',
        export: 'Export page data',
      }
      return labels[task] || task
    }

    // ─── Message rendering ────────────────────
    function addMessage(role, text, meta = {}) {
      const msgEl = document.createElement('div')
      msgEl.className = `msg ${role}`

      const avatar = document.createElement('div')
      avatar.className = 'msg-avatar'
      avatar.textContent = role === 'ai' ? '✦' : '↑'

      const bubble = document.createElement('div')
      bubble.className = 'msg-bubble'
      bubble.textContent = text

      if (role === 'ai' && meta.task) {
        const actions = document.createElement('div')
        actions.className = 'result-actions'
        actions.innerHTML = `
          <button class="result-action-btn" onclick="copyText(this.closest('.msg-bubble').querySelector('.msg-bubble') || this.closest('.msg').querySelector('.msg-bubble'))">📋 Copy</button>
          ${meta.cached ? '<span class="result-action-btn" style="color:var(--cyan);border-color:rgba(34,211,238,0.2)">⚡ Cached</span>' : ''}
        `
        bubble.appendChild(actions)
      }

      msgEl.appendChild(avatar)
      msgEl.appendChild(bubble)
      messagesEl.appendChild(msgEl)
      messagesEl.scrollTop = messagesEl.scrollHeight
      return msgEl
    }

    function addThinking() {
      const id = 'thinking-' + Date.now()
      const msgEl = document.createElement('div')
      msgEl.className = 'msg ai'
      msgEl.id = id
      msgEl.innerHTML = `
        <div class="msg-avatar">✦</div>
        <div class="msg-bubble"><div class="thinking"><span></span><span></span><span></span></div></div>
      `
      messagesEl.appendChild(msgEl)
      messagesEl.scrollTop = messagesEl.scrollHeight
      return id
    }

    function removeThinking(id) {
      document.getElementById(id)?.remove()
    }

    function copyText(el) {
      const text = el?.textContent || ''
      navigator.clipboard.writeText(text).catch(() => {})
    }
  </script>
</body>
</html>
